<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineFlix Premium</title>

<style>

/* ===== CONFIG GERAL ===== */
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* ===== HEADER ===== */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

header h1 {
  color: #e50914;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  background: url('img/catalogo-popular.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

/* ESCURECIMENTO */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, black, rgba(0,0,0,0.6));
}

.hero-content {
  position: relative;
  z-index: 2;
}

/* ===== BOTÕES ===== */
.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: #e50914;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  border-radius: 5px;
}

/* ===== CATÁLOGO ===== */
.section {
  padding: 40px 20px;
}

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 20px;
}

.row img {
  width: 160px;
  border-radius: 5px;
  transition: 0.3s;
}

.row img:hover {
  transform: scale(1.1);
}

/* ===== PLANOS ===== */
.planos {
  text-align: center;
}

.planos-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.card {
  background: #1a1a1a;
  padding: 25px;
  width: 250px;
  border-radius: 10px;
}

.destaque {
  border: 2px solid red;
}

/* ===== WHATSAPP ===== */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px 20px;
  border-radius: 50px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>CineTV</h1>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <h1>Streaming Premium</h1>
    <p>Filmes, séries e canais ao vivo em HD</p>

    <!-- BOTÃO PROMOÇÃO -->
    <button class="btn" onclick="window.open('https://go.atomopay.com.br/wwdiz?affh=60h153pk5w')">
      PROMOÇÃO! COMPRE 1 ANO E GANHE OUTRO!
    </button>

  </div>
</section>

<!-- CATÁLOGO -->
<section class="section">

  <h2 style="margin-left:20px;">Populares</h2>

  <div class="row">
    <img src="img/it-welcome.jpg">
    <img src="img/demon-slayer.jpg">
    <img src="img/stranger-things.jpg">
    <img src="img/the-last-of-us.jpg">
    <img src="img/the-boys.jpg">
    <img src="img/breaking-bed.jpg">
    <img src="img/panico-6.jpg">
    <img src="img/greys-anatomy.jpg">
    <img src="img/my-hero-academy.jpg">
  </div>

</section>

<!-- PLANOS -->
<section class="section planos">

  <h2>Escolha seu Plano</h2>

  <div class="planos-container">

    <div class="card">
      <h3>Mensal</h3>
      <p>R$24,90</p>
      <button onclick="plano('Mensal')">Assinar</button>
    </div>

    <div class="card">
      <h3>Semestral</h3>
      <p>R$69,90</p>
      <button onclick="plano('Trimestral')">Assinar</button>
    </div>

    <div class="card destaque">
      <h3>Anual</h3>
      <p>R$97</p>
      <button onclick="plano('Anual')">Assinar</button>
    </div>

  </div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://chat.whatsapp.com/F89jDDNw3BaEu9xXlL19z6" target="_blank">
  💬 Suporte
</a>

<script>

/* ===== LINKS DOS PLANOS ===== */
function plano(tipo) {

  let url = "";

  if (tipo === "Mensal") {
    url = "https://go.atomopay.com.br/jgeam?affh=60h153pk5w";
  }

  if (tipo === "Semestral") {
    url = "https://go.atomopay.com.br/mruuv?affh=60h153pk5w";
  }

  if (tipo === "Anual") {
    url = "https://go.atomopay.com.br/cnjz2?affh=60h153pk5w";
  }

  window.open(url, "_blank");
}

</script>

</body>
</html>
