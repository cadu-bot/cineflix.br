<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineFlix Premium</title>

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* ===== HEADER ===== */
header {
  position: fixed;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

header h1 {
  color: #e50914;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  background: url('img/catalogo-popular.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  padding: 0 50px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, black 30%, transparent);
}

.hero-content {
  max-width: 500px;
  z-index: 2;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  margin-bottom: 20px;
  color: #ccc;
}

/* ===== BOTÃO ===== */
.btn {
  padding: 15px 30px;
  background: #e50914;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: #ff1e2d;
}

/* ===== SEÇÕES ===== */
.section {
  padding: 60px 40px;
}

.section h2 {
  margin-bottom: 10px;
}

/* ===== CARROSSEL ===== */
.row {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 20px 0;
  scroll-behavior: smooth;
}

.row::-webkit-scrollbar {
  display: none;
}

.row img {
  width: 180px;
  flex: 0 0 auto;
  border-radius: 6px;
  transition: 0.3s;
  cursor: pointer;
}

.row img:hover {
  transform: scale(1.08);
}

/* ===== PLANOS ===== */
.planos-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 25px;
  width: 260px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  font-size: 26px;
  margin-bottom: 15px;
}

.destaque {
  border: 2px solid #e50914;
}

/* ===== ESPORTES ===== */
.esportes {
  position: relative;
  min-height: 100vh;
  background: url('img/campo.jpg') center/cover no-repeat;
}

.esportes::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, black, rgba(0,0,0,0.6));
}

.esportes-content {
  position: relative;
  z-index: 2;
  padding: 60px 40px;
}

/* ===== WHATSAPP ===== */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 14px 18px;
  border-radius: 50px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* ===== RESPONSIVO ===== */
@media(max-width:768px){
  .hero h1 {
    font-size: 32px;
  }

  .row img {
    width: 140px;
  }
}

</style>
</head>

<body>

<header>
  <h1>CineTV</h1>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Streaming Premium</h1>
    <p>Filmes, séries e canais ao vivo em HD</p>

    <button class="btn" onclick="window.open('https://go.atomopay.com.br/wwdiz?affh=60h153pk5w')">
      PROMOÇÃO! COMPRE 1 ANO E GANHE OUTRO!
    </button>
  </div>
</section>

<!-- CATÁLOGO -->
<section class="section">
  <h2>Populares</h2>

  <div class="row">
    <img src="img/it-welcome.jpg" onclick="abrirLink('it')">
    <img src="img/demon-slayer.jpg" onclick="abrirLink('demon')">
    <img src="img/stranger-things.jpg" onclick="abrirLink('stranger')">
    <img src="img/the-last-of-us.jpg" onclick="abrirLink('lastofus')">
    <img src="img/the-boys.jpg" onclick="abrirLink('boys')">
    <img src="img/breaking-bed.jpg" onclick="abrirLink('breaking')">
    <img src="img/panico-6.jpg" onclick="abrirLink('panico')">
    <img src="img/my-hero-academy.jpg" onclick="abrirLink('myhero')">
    <img src="img/quarteto.jpg" onclick="abrirLink('quarteto')">
    <img src="img/deadpool.jpg" onclick="abrirLink('deadpool')">
  </div>
</section>

<!-- PLANOS -->
<section class="section">
  <h2 style="text-align:center;">Escolha seu Plano</h2>

  <div class="planos-container">

    <div class="card">
      <h3>Mensal</h3>
      <p>R$24,90</p>
      <button class="btn" onclick="plano('Mensal')">Assinar</button>
    </div>

    <div class="card">
      <h3>Semestral</h3>
      <p>R$69,90</p>
      <button class="btn" onclick="plano('Semestral')">Assinar</button>
    </div>

    <div class="card destaque">
      <h3>Anual</h3>
      <p>R$97</p>
      <button class="btn" onclick="plano('Anual')">Assinar</button>
    </div>

  </div>
</section>

<!-- ESPORTES -->
<section class="esportes">

  <div class="esportes-content">

    <h2>Canais Esportivos</h2>

    <div class="row">
      <img src="img/espn.png" onclick="esporte('ESPN')">
      <img src="img/sportv.jpg" onclick="esporte('Sportv')">
      <img src="img/premere.png" onclick="esporte('Premiere')">
      <img src="img/fox.png" onclick="esporte('Fox')">
      <img src="img/combate.jpg" onclick="esporte('Combate')">
      <img src="img/discovery-turbo.jpg" onclick="esporte('dt')">
      <img src="img/Discovery-channel.jpg" onclick="esporte('dc')">
      <img src="img/band-e-bandsports.png" onclick="esporte('bs')">
    </div>

    <div style="text-align:center; margin-top:20px;">
      <button class="btn" onclick="esporte('geral')">
        ASSISTIR ESPORTES AGORA
      </button>
    </div>

  </div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://chat.whatsapp.com/F89jDDNw3BaEu9xXlL19z6" target="_blank">
  💬 Suporte
</a>

<script>

/* ESPORTES */
function esporte(tipo){
  let url="";
  if(tipo==="ESPN") url="https://www.espn.com.br";
  if(tipo==="Sportv") url="https://sportv.globo.com";

  if(tipo==="dc") url="https://discoverychannel.com.pt";
  if(tipo==="bs") url="https://bandsports.uol.com.br";
  if(tipo==="geral") url="https://go.atomopay.com.br/wwdiz?affh=60h153pk5w";
  window.open(url,"_blank");
}

/* PLANOS */
function plano(tipo){
  let url="";
  if(tipo==="Mensal") url="https://go.atomopay.com.br/jgeam?affh=60h153pk5w";
  if(tipo==="Semestral") url="https://go.atomopay.com.br/mruuv?affh=60h153pk5w";

/* CATÁLOGO */
function abrirLink(tipo){
  let url="";

  if(tipo==="demon") url="https://www.adorocinema.com/series/serie-25661/";

  if(tipo==="myhero") url="https://www.adorocinema.com/series/serie-22113/";
  if(tipo==="quarteto") url="https://www.adorocinema.com/filmes/filme-226116/";
  if(tipo==="deadpool") url="https://www.adorocinema.com/filmes/filme-251633/";
  window.open(url,"_blank");
}

</script>

</body>
</html>
