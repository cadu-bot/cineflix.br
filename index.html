<style>

/* ===== CONFIG GERAL ===== */
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}
/* FUNDO ESPORTES */
.esportes {
  position: relative;
  background: url('img/campo.jpg') center/cover no-repeat;
  padding: 60px 20px;
}

.esportes::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.esportes-content {
  position: relative;
  z-index: 2;
}
/* ===== HEADER ===== */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

header h1 {
  color: #e50914;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  background: url('img/catalogo-popular.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

/* ESCURECIMENTO */
.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, black, rgba(0,0,0,0.6));
}

.hero-content {
  position: relative;
  z-index: 2;
}

/* ===== BOTÕES ===== */
.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: #e50914;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  border-radius: 5px;
}

/* ===== CATÁLOGO ===== */
.section {
  padding: 40px 20px;
}

.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 20px;
}

.row img {
  width: 160px;
  border-radius: 5px;
  transition: 0.3s;
}

.row img:hover {
  transform: scale(1.1);
}

/* ===== PLANOS ===== */
.planos {
  text-align: center;
}

.planos-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.card {
  background: #1a1a1a;
  padding: 25px;
  width: 250px;
  border-radius: 10px;
}

.destaque {
  border: 2px solid red;
}

/* ===== WHATSAPP ===== */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px 20px;
  border-radius: 50px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}
