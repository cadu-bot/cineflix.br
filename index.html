<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTV Premium</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      position: fixed;
      width: 100%;
      z-index: 10;
    }

    header h1 {
      color: red;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      height: 100vh;
      background: url('capa_fundo_netflix.WEBP') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      top: 0;
      left: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h2 {
      font-size: 45px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      background: red;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .dark {
      background: #111;
    }

    .grid {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 20px;
    }

    .grid img {
      width: 200px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .grid img:hover {
      transform: scale(1.1);
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      margin: auto;
    }

    .price {
      font-size: 28px;
      margin: 10px 0;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: black;
    }
  </style>

</head>
<body>

<header>

  <nav>

  </div>

    <div class="card">

    <div class="card">

<footer>

</body>
</html>
