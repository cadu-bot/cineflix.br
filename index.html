<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineTV Premium</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: black;
      position: fixed;
      width: 100%;
    }

    header h1 {
      color: red;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      /* 🔥 COLOQUE SUA IMAGEM AQUI */
      background: url('img/banner.jpg') center/cover;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .grid {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 20px;
    }

    .grid img {
      width: 200px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .grid img:hover {
      transform: scale(1.1);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      background: red;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    footer {
      padding: 20px;
      text-align: center;
      background: black;
    }
  </style>
</head>

<body>

<header>
  <h1>CineTV</h1>
  <nav>
    <a href="#catalogo">Catálogo</a>
    <a href="#planos">Planos</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h2>Streaming Premium</h2>
    <p>Filmes, séries e canais ao vivo</p>

    <!-- 🔥 LINK EXTERNO (troque aqui) -->
    <a class="btn" href="https://seulink.com" target="_blank">
      TESTE GRÁTIS
    </a>

  </div>
</section>

<!-- CATÁLOGO -->
<section id="catalogo" class="section">
  <h2>Catálogo</h2>

  <div class="grid">

    <!-- 🔥 ADICIONE IMAGENS AQUI -->
    <img src="img/filme1.jpg">
    <img src="img/filme2.jpg">
    <img src="img/filme3.jpg">
    <img src="img/filme4.jpg">

  </div>
</section>

<!-- PLANOS -->
<section id="planos" class="section">
  <h2>Planos</h2>

  <p>Plano mensal: R$25</p>

  <!-- 🔥 LINK EXTERNO (WHATSAPP / PAGAMENTO) -->
  <a class="btn" href="https://wa.me/5511999999999" target="_blank">
    ASSINAR AGORA
  </a>

</section>

<footer>
  <p>© 2026 CineTV</p>
</footer>

</body>
</html>
